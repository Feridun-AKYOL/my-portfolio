    <main class="container bg-light">
        <h2 class="text-center m-5 animate__animated animate__fadeInUp">Contact Me</h2>

            <!-- Contact Information -->
            <div class="col-lg-4 mb-4 animate__animated animate__fadeInLeft">

                    <div class="card-body">
                        <h3 class="h5 mb-4">Get in Touch</h3>

                        <div class="d-flex mb-3">

                                <h4 class="h6 mb-1">Email</h4>
                                <a href="mailto:feridunakyol34@gmailcom"

            <!-- Contact Form -->
            <div class="col-lg-8 wow animate__animated animate__fadeInRight">
                <div class="card">
                    <div class="card-body">
                        <form id="contactForm" onsubmit="return handleSubmit(event)">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="name" class="form-label">Your Name</label>
                                    <input type="text" class="form-control" id="name" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="email" class="form-label">Your Email</label>
                                    <input type="email" class="form-control" id="email" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label for="subject" class="form-label">Subject</label>
                                <input type="text" class="form-control" id="subject" required>
                            </div>
                            <div class="mb-3">
                                <label for="message" class="form-label">Message</label>
                                <textarea class="form-control" id="message" rows="5" required></textarea>
                            </div>
                            <div class="mb-3">
                                <button type="submit" class="btn btn-primary">
                                    Send Message
                                    <i class="fas fa-paper-plane ms-2"></i>
                                </button>
                            </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <script>
        function handleSubmit(event) {
            event.preventDefault();
            // Get form data
            const formData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                subject: document.getElementById('subject').value,
                message: document.getElementById('message').value
            };
            alert('Thank you for your message! I will get back to you soon.');
            // Reset form
            event.target.reset();
            return false;
        }
        function handleSubmit(event) {
            event.preventDefault();
            // Show loading state
            const submitBtn = event.target.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<span class="loading-spinner"></span> Sending...';
            submitBtn.disabled = true;
            // Simulate form submission (replace with actual API call)
            setTimeout(() => {
                // Reset button
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
                // Show success notification
                const toast = document.getElementById('toastNotification');
                toast.classList.add('show');
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 3000);
                // Reset form
                event.target.reset();
            }, 1500);
            return false;
        }
        // Add input animation handlers
        document.querySelectorAll('.contact-form .form-control').forEach(input => {
            input.addEventListener('focus', function () {
                this.parentElement.classList.add('focused');
            });
            input.addEventListener('blur', function () {
                if (!this.value) {
                    this.parentElement.classList.remove('focused');
                }
            });
        });
    </script>
