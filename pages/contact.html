<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../CSS/contact.css">
    <script src="../index.js" defer></script>
</head>

<body>
    <header>
        <nav class="navbar navbar-expand-lg bg-body-tertiary d-flex justify-content-between" data-bs-theme="dark">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">
                    <img src="../images/Feridun.png" alt="Logo" width="30" height="24"
                        class="d-inline-block align-text-top">
                    Feridun Akyol
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
            </div>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="../index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="./education.html">Education</a></li>
                    <li class="nav-item"><a class="nav-link" href="./portfolio.html">Portfolio</a></li>
                    <li class="nav-item"><a class="nav-link" href="./skills.html">Skills</a></li>
                    <li class="nav-item"><a class="nav-link active" aria-current="page"
                            href="./contact.html">Contact</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main class="container bg-light">
        <h2 class="text-center m-5 animate__animated animate__fadeInUp">Contact Me</h2>
        <div class="row">
            <div class="col-lg-4 mb-4 animate__animated animate__fadeInLeft">
                <div class="card h-100">
                    <div class="card-body">
                        <h3 class="h5 mb-4">Get in Touch</h3>
                        <p><i class="fas fa-map-marker-alt me-2"></i> Limburg, Belgium</p>
                        <p><i class="fas fa-envelope me-2"></i> <a
                                href="mailto:feridunakyol34@gmail.com">feridunakyol34@gmail.com</a></p>
                        <p><i class="fas fa-phone me-2"></i> <a href="tel:+32612345678">+32 6 1234 5678</a></p>
                        <p><i class="fab fa-linkedin me-2"></i> <a href="https://linkedin.com/in/feridun-akyol"
                                target="_blank">linkedin.com/in/feridun-akyol</a></p>
                    </div>
                </div>
            </div>
            <div class="col-lg-8 animate__animated animate__fadeInRight">
                <div class="card">
                    <div class="card-body">
                        <form id="contactForm" onsubmit="return handleSubmit(event)">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="name" class="form-label">Your Name</label>
                                    <input type="text" class="form-control" id="name" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="email" class="form-label">Your Email</label>
                                    <input type="email" class="form-control" id="email" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label for="subject" class="form-label">Subject</label>
                                <input type="text" class="form-control" id="subject" required>
                            </div>
                            <div class="mb-3">
                                <label for="message" class="form-label">Message</label>
                                <textarea class="form-control" id="message" rows="5" required></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary">Send Message <i
                                    class="fas fa-paper-plane ms-2"></i></button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="container-fluid text-center py-3">
        <p>&copy; 2025 Feridun Akyol</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>
    <script>
        function handleSubmit(event) {
            event.preventDefault();
            const submitBtn = event.target.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Sending...';
            submitBtn.disabled = true;

            setTimeout(() => {
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
                alert('Thank you for your message! I will get back to you soon.');
                event.target.reset();
            }, 1500);
        }
    </script>
</body>

</html>
